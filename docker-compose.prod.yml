version: "3.9"

networks:
  microservices-net:
    driver: bridge

services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${SQL_SA_PASSWORD}"
      ACCEPT_EULA: "Y"
    volumes:
      - sqlserver-data:/var/opt/mssql
    expose:
      - "1433"
    networks:
      - microservices-net
    restart: unless-stopped

  auth-service:
    image: ghcr.io/zoubairmabrouk/auth-service:${AUTH_VERSION}
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >
        Server=sqlserver,1433;Database=AuthDb;
        User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True
      Jwt__SecretKey:                "${JWT_SECRET_KEY}"
      Jwt__Issuer:                   "${JWT_ISSUER}"
      Jwt__Audience:                 "${JWT_AUDIENCE}"
      Jwt__AccessTokenExpiryMinutes: "15"
      Jwt__RefreshTokenExpiryDays:   "7"
    networks:
      - microservices-net
    depends_on:
      - sqlserver
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  mdx-service:
    image: ghcr.io/zoubairmabrouk/mdx-service:${MDX_VERSION}
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >
        Server=sqlserver,1433;Database=MdxDb;
        User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__Issuer:    "${JWT_ISSUER}"
      Jwt__Audience:  "${JWT_AUDIENCE}"
    networks:
      - microservices-net
    depends_on:
      - sqlserver
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  rag-service:
    image: ghcr.io/zoubairmabrouk/rag-service:${AI_VERSION}
    expose:
      - "8080"
    environment:
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      JWT_ISSUER:     "${JWT_ISSUER}"
      JWT_AUDIENCE:   "${JWT_AUDIENCE}"
    networks:
      - microservices-net
    restart: unless-stopped

  conv-service:
    image: ghcr.io/zoubairmabrouk/conv-service:${CONV_VERSION}
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >
        Server=sqlserver,1433;Database=ConvDb;
        User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True
      Jwt__SecretKey: "${JWT_SECRET_KEY}"
      Jwt__Issuer:    "${JWT_ISSUER}"
      Jwt__Audience:  "${JWT_AUDIENCE}"
    networks:
      - microservices-net
    depends_on:
      - sqlserver
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  gateway:
    image: ghcr.io/zoubairmabrouk/gateway-service:${GATEWAY_VERSION}
    ports:
      - "8088:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS:          "http://+:8080"
      JwtSettings__Issuer:      "${JWT_ISSUER}"
      JwtSettings__Audience:    "${JWT_AUDIENCE}"
      JwtSettings__Key:         "${JWT_SECRET_KEY}"
    networks:
      - microservices-net
    depends_on:
      - auth-service
      - mdx-service
      - rag-service
      - conv-service
    restart: unless-stopped
  frontend:
    image: ghcr.io/zoubairmabrouk/frontend:${FRONTEND_VERSION}
    ports:
      - "82:80"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS:          "http://+:82"
    networks:
      - microservices-net
    restart: unless-stopped

volumes:
  sqlserver-data: